name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      checks: write
      contents: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: kubeguard
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          POSTGRES_DB: kubeguard_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn -B -ntp -T 1C clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/kubeguard_test
          SPRING_DATASOURCE_USERNAME: kubeguard
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}

      - name: Extract Spring Boot layers
        run: |
          rm -f target/*-plain.jar || true
          java -Djarmode=layertools -jar target/*.jar extract --destination target/extracted
          mkdir -p target/extracted/dependencies target/extracted/spring-boot-loader target/extracted/snapshot-dependencies target/extracted/application

      - name: Extract version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: kubeguard-layers
          path: target/extracted/
          retention-days: 1

      - name: Generate test report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Cache Dependency-Check DB
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-db-${{ steps.date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-db-

      - name: Run OWASP Dependency Check
        run: |
          mvn -B -ntp org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DskipTestScope=true \
            -Dnvd.api.key=${{ secrets.NVD_API_KEY }} \
            -Dformat=ALL

      - name: Upload OWASP reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: owasp-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.xml
          retention-days: 3

  docker:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    name: Docker Build

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-uri: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: kubeguard-layers
          path: target/extracted

      - name: Ensure layer directories exist
        run: |
          mkdir -p target/extracted/dependencies target/extracted/spring-boot-loader target/extracted/snapshot-dependencies target/extracted/application

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.build-and-test.outputs.version }}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=KubeGuard
            org.opencontainers.image.description=Kubernetes Security Scanner
            org.opencontainers.image.vendor=KubeGuard Team
            org.opencontainers.image.version=${{ needs.build-and-test.outputs.version }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: scripts/Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ needs.build-and-test.outputs.version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Generate provenance attestation (SLSA Provenance)
          # This creates a signed attestation of how the image was built
          provenance: mode=max
          # Generate SBOM attestation (Software Bill of Materials)
          # This creates a complete list of all software components
          sbom: true
      
      - name: Verify attestations
        run: |
          echo "Image built with attestations:"
          echo "- Digest: ${{ steps.build.outputs.digest }}"
          echo "- SBOM: Attached (use 'docker buildx imagetools inspect' to view)"
          echo "- Provenance: Attached (SLSA compliant)"
          echo ""
          echo "To inspect attestations locally:"
          echo "  docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} --format '{{ json .Provenance }}'"
          echo "  docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} --format '{{ json .SBOM }}'"
